site_name: RUC Survival Guide
site_description: Unofficial student-maintained survival guide for Renmin University of China
site_url: https://example.github.io/ruc-survival-guide/
repo_name: ruc-survival-guide
repo_url: https://github.com/your-name/ruc-survival-guide
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.action.view
    - content.tabs.link
  palette:
    - scheme: default
      primary: red
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-name/ruc-survival-guide

nav:
  - Home: index.md
  - Guide:
      - guide/index.md
      - Freshman: guide/freshman.md
      - Course Selection: guide/course-selection.md
